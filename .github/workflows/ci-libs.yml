name: CI — Libs

on:
  push:
    branches: [main]
    paths:
      - 'libs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.base.json'
  pull_request:
    paths:
      - 'libs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.base.json'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm nx run-many -t lint,test --projects=writing,library,intelligence,publishing,ui-web,ui-native,api-contracts --parallel=4
